<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaxVista</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: #f4f7fb;
      color: #172033;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      padding: 18px 32px;
      background: #fff;
      border-bottom: 1px solid #e6ebf2;
    }

    .brand { font-weight: 700; font-size: 22px; color: #1746a2; }
    .nav-badge {
      background: #eef4ff;
      color: #1746a2;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
    }

    .hero {
      max-width: 1100px;
      margin: auto;
      padding: 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric { background:#f7faff; padding:15px; border-radius:12px; }
    .metric-label { font-size:12px; color:#666; }
    .metric-value { font-size:22px; font-weight:bold; }

    .main {
      max-width: 1100px;
      margin: auto;
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 20px;
      padding: 20px;
    }

    input, select {
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid #ddd;
      margin-bottom:10px;
    }

    button {
      padding:10px;
      border:none;
      border-radius:10px;
      font-weight:bold;
      cursor:pointer;
    }

    .primary { background:#1746a2; color:white; }
    .secondary { background:#eef3fb; }

    .year-select-grid {
      display:grid;
      grid-template-columns: repeat(5,1fr);
      gap:6px;
      margin-bottom:10px;
    }

    .year-chip {
      padding:8px;
      text-align:center;
      background:#eee;
      border-radius:10px;
    }

    .chart-card { background:white; padding:20px; border-radius:20px; }
  </style>
</head>

<body>

<div class="navbar">
  <div class="brand">TaxVista</div>
  <div class="nav-badge">Auto updating years</div>
</div>

<div class="hero">
  <div class="card">
    <h1>Understand your taxes</h1>
    <p>Track trends and insights over time.</p>
  </div>

  <div class="card">
    <div class="metric-grid">
      <div class="metric">
        <div class="metric-label">Returns</div>
        <div class="metric-value" id="metricReturns">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Latest</div>
        <div class="metric-value" id="metricLatest">-</div>
      </div>
      <div class="metric">
        <div class="metric-label">Avg Rate</div>
        <div class="metric-value" id="metricRate">0%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Credits</div>
        <div class="metric-value" id="metricCredits">$0</div>
      </div>
    </div>
  </div>
</div>

<div class="main">

  <div class="card">
    <h3>Add or update a return</h3>

    <div id="yearChips" class="year-select-grid"></div>

    <select id="taxYear"></select>

    <input type="number" id="agi" placeholder="AGI">
    <input type="number" id="taxableIncome" placeholder="Taxable Income">
    <input type="number" id="totalTax" placeholder="Total Tax">
    <input type="number" id="credits" placeholder="Credits">

    <button class="primary" onclick="saveReturn()">Save</button>
    <button class="secondary" onclick="loadDemo()">Demo</button>
  </div>

  <div>
    <div class="chart-card">
      <canvas id="chart"></canvas>
    </div>
  </div>

</div>

<script>

let data = [];

function generateYears(){
  const current = new Date().getFullYear();

  const chips = document.getElementById("yearChips");
  const select = document.getElementById("taxYear");

  chips.innerHTML = "";
  select.innerHTML = "";

  for(let i=0;i<5;i++){
    let y = current - i;

    let chip = document.createElement("div");
    chip.className="year-chip";
    chip.innerText=y;
    chips.appendChild(chip);

    let opt = document.createElement("option");
    opt.value=y;
    opt.text=y;
    select.appendChild(opt);
  }

  document.getElementById("metricLatest").innerText=current;
}

function saveReturn(){
  let r = {
    year: document.getElementById("taxYear").value,
    agi: +document.getElementById("agi").value,
    tax: +document.getElementById("totalTax").value,
    credits: +document.getElementById("credits").value
  };

  data.push(r);

  localStorage.setItem("taxData", JSON.stringify(data));

  render();
}

function loadStorage(){
  let d = localStorage.getItem("taxData");
  if(d) data = JSON.parse(d);
}

function loadDemo(){
  data = [
    {year:"2022", agi:50000, tax:5000, credits:300},
    {year:"2023", agi:70000, tax:8000, credits:600},
    {year:"2024", agi:90000, tax:12000, credits:900}
  ];
  render();
}

function render(){
  document.getElementById("metricReturns").innerText=data.length;

  if(data.length){
    let avg = data.reduce((a,b)=>a+(b.tax/b.agi),0)/data.length;
    document.getElementById("metricRate").innerText=(avg*100).toFixed(1)+"%";

    let credits = data.reduce((a,b)=>a+b.credits,0);
    document.getElementById("metricCredits").innerText="$"+credits;
  }

  drawChart();
}

let chart;

function drawChart(){
  if(chart) chart.destroy();

  let ctx=document.getElementById("chart");

  chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:data.map(x=>x.year),
      datasets:[{
        label:"AGI",
        data:data.map(x=>x.agi)
      }]
    }
  });
}

generateYears();
loadStorage();
render();

</script>

</body>
</html>
